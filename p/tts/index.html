<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>TTS Kustom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#111118;--card:#1a1a24;--border:rgba(255,255,255,0.07);
  --gold:#f0c040;--gold-dim:rgba(240,192,64,0.12);
  --blue:#4a9eff;--blue-dim:rgba(74,158,255,0.12);
  --green:#3ddc84;--green-dim:rgba(61,220,132,0.12);
  --red:#ff5c5c;--purple:#c084fc;
  --t1:#f0f0f8;--t2:rgba(240,240,248,0.5);--t3:rgba(240,240,248,0.25);
  --cell:#1e1e2e;--cell-hi:#1e2d45;--cell-sel:#003366;
  --r:10px;--font:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--font);-webkit-font-smoothing:antialiased;user-select:none}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.screen.fly-in{animation:flyIn .35s cubic-bezier(.16,1,.3,1) both}
.screen.fly-out{animation:flyOut .25s cubic-bezier(.16,1,.3,1) both}
.screen.fly-back-in{animation:flyBackIn .35s cubic-bezier(.16,1,.3,1) both}
.screen.fly-back-out{animation:flyBackOut .25s cubic-bezier(.16,1,.3,1) both}
@keyframes flyIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
@keyframes flyOut{from{transform:none}to{transform:translateX(-28%);opacity:.3}}
@keyframes flyBackIn{from{transform:translateX(-28%);opacity:.3}to{transform:none;opacity:1}}
@keyframes flyBackOut{from{transform:none}to{transform:translateX(100%);opacity:0}}

/* ── SETUP SCREEN ── */
#screen-setup{background:var(--bg);padding:0}
.setup-wrap{display:flex;flex-direction:column;height:100%;padding:24px 20px 20px;gap:16px;max-width:640px;margin:0 auto;width:100%}
.logo{display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo-grid{display:grid;grid-template-columns:repeat(3,10px);grid-template-rows:repeat(3,10px);gap:3px}
.logo-grid span{border-radius:2px;background:var(--border)}
.logo-grid span:nth-child(1){background:var(--gold)}
.logo-grid span:nth-child(5){background:var(--blue)}
.logo-grid span:nth-child(9){background:var(--green)}
.logo-title{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.logo-title em{font-style:normal;color:var(--gold)}

.setup-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);flex-shrink:0}

.word-editor{
  flex:1;min-height:0;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;
}
.word-editor-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;
}
.we-count{font-size:12px;color:var(--t3);font-family:var(--mono)}
.we-hint{font-size:11px;color:var(--t3)}
.word-table{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.word-row{
  display:grid;grid-template-columns:28px 1fr 1fr auto;
  align-items:center;gap:0;border-bottom:1px solid rgba(255,255,255,0.04);
}
.word-row:last-child{border-bottom:none}
.row-num{
  text-align:center;font-size:11px;color:var(--t3);font-family:var(--mono);
  padding:8px 0;flex-shrink:0;
}
.row-input{
  background:transparent;border:none;outline:none;
  color:var(--t1);font-family:var(--font);font-size:13px;
  padding:9px 10px;width:100%;
  border-left:1px solid rgba(255,255,255,0.04);
}
.row-input::placeholder{color:var(--t3)}
.row-input.answer{
  text-transform:uppercase;font-family:var(--mono);font-size:13px;
  font-weight:500;letter-spacing:1px;color:var(--gold);
}
.row-del{
  width:32px;height:100%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t3);font-size:15px;transition:color .15s;
  border-left:1px solid rgba(255,255,255,0.04);
}
.row-del:hover{color:var(--red)}

.toolbar-btn{
  height:30px;padding:0 12px;border-radius:6px;border:1px solid var(--border);
  background:var(--card);color:var(--t1);font-family:var(--font);font-size:12px;
  font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;
  transition:all .15s;white-space:nowrap;
}
.toolbar-btn:hover{border-color:var(--blue);color:var(--blue)}

.start-btn{
  flex-shrink:0;height:52px;border-radius:var(--r);border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--gold),#e8a020);
  color:#000;font-family:var(--font);font-size:16px;font-weight:800;
  letter-spacing:.5px;transition:all .2s;
  box-shadow:0 4px 24px rgba(240,192,64,.3);
}
.start-btn:hover{transform:translateY(-1px);box-shadow:0 6px 32px rgba(240,192,64,.4)}
.start-btn:active{transform:translateY(0)}
.start-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── GAME SCREEN ── */
#screen-game{background:var(--bg)}
#screen-game #app{display:flex;flex-direction:column;height:100%}

.g-header{
  flex-shrink:0;height:52px;display:flex;align-items:center;
  padding:0 14px;gap:10px;
  background:rgba(10,10,15,.9);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);z-index:10;
}
.g-back{
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t1);font-size:16px;transition:all .15s;flex-shrink:0;
}
.g-back:hover{background:rgba(255,255,255,.1)}
.g-title{flex:1;min-width:0;font-size:15px;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-pills{display:flex;gap:5px;flex-shrink:0}
.pill{
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:999px;padding:4px 10px;
  display:flex;flex-direction:column;align-items:center;
}
.pill-l{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);line-height:1}
.pill-v{font-size:13px;font-weight:700;color:var(--t1);line-height:1.3;font-variant-numeric:tabular-nums}
#pv-score{color:var(--gold)}
#pv-words{color:var(--green)}

.g-prog{flex-shrink:0;height:2px;background:var(--border)}
.g-prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--green));transition:width .4s}

.g-body{flex:1;min-height:0;display:flex;flex-direction:column;position:relative;overflow:hidden}
@media(min-width:768px){.g-body{flex-direction:row}}

.g-grid-area{
  flex:1;min-height:0;overflow:auto;
  display:flex;align-items:flex-start;justify-content:flex-start;
  padding:16px;background:var(--bg);position:relative;
}
.g-grid-area.centered{align-items:center;justify-content:center}
#grid-container{outline:none;flex-shrink:0}

.cw-grid{display:grid;gap:3px;background:var(--bg)}
.cw-cell{
  position:relative;display:flex;align-items:center;justify-content:center;
  border-radius:3px;transition:background .1s;flex-shrink:0;
}
.cw-cell.blocked{background:var(--bg)}
.cw-cell.active{background:var(--cell);cursor:pointer;border:1px solid rgba(255,255,255,.06)}
.cw-cell.hi{background:var(--cell-hi)}
.cw-cell.sel{background:var(--cell-sel)!important;box-shadow:inset 0 0 0 2px var(--blue)}
.cw-cell.ok{background:#0b3d21!important}
.cw-cell.err{background:#3d0b0b!important;box-shadow:inset 0 0 0 2px var(--red);animation:shake .35s ease}
.cw-cell.hint{background:#2c1c42!important}
.cw-cell.pop{animation:pop .14s cubic-bezier(.34,1.56,.64,1)}
.cell-n{position:absolute;top:2px;left:3px;font-size:9px;font-weight:600;color:var(--t3);line-height:1;pointer-events:none}
.cell-l{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--t1);text-transform:uppercase;pointer-events:none}

@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}

.zoom-wrap{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:4px;z-index:20}
.zoom-btn{
  width:34px;height:34px;border-radius:8px;
  background:var(--card);border:1px solid var(--border);
  color:var(--t1);font-size:17px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .12s;
}
.zoom-btn:hover{background:rgba(255,255,255,.1)}

.clue-panel{
  flex-shrink:0;background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;height:190px;
}
@media(min-width:768px){.clue-panel{width:270px;height:auto;border-top:none;border-left:1px solid var(--border)}}
.clue-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.clue-tab{
  flex:1;padding:9px;font-size:11px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--t3);text-align:center;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;
}
.clue-tab.active{color:var(--t1);border-bottom-color:var(--gold)}
.clue-pane{display:none;flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.clue-pane.active{display:block}
.clue-item{
  display:flex;align-items:baseline;gap:9px;padding:9px 14px;
  cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);
  transition:background .1s;
}
.clue-item:hover{background:rgba(255,255,255,.03)}
.clue-item.active{background:var(--blue-dim)}
.clue-item.done .clue-text{text-decoration:line-through;color:var(--t3)}
.clue-num{font-size:10px;font-weight:700;color:var(--gold);min-width:16px;flex-shrink:0;font-family:var(--mono)}
.clue-text{font-size:12px;color:var(--t2);line-height:1.4}

.g-footer{
  flex-shrink:0;height:56px;display:flex;align-items:center;justify-content:center;
  gap:6px;padding:0 10px;background:var(--surface);border-top:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;
}
.g-footer::-webkit-scrollbar{display:none}
.ctrl{
  height:34px;padding:0 12px;border-radius:999px;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--t1);font-family:var(--font);font-size:12px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;
  transition:all .12s;flex-shrink:0;
}
.ctrl:hover{background:rgba(255,255,255,.1)}
.ctrl.p{background:var(--blue-dim);border-color:rgba(74,158,255,.25);color:var(--blue)}
.hint-n{
  background:var(--purple);color:#000;font-size:10px;font-weight:700;
  padding:1px 5px;border-radius:999px;min-width:18px;text-align:center;
}

/* ── OVERLAY ── */
.overlay{
  position:fixed;inset:0;z-index:800;display:none;
  align-items:flex-end;justify-content:center;padding-bottom:20px;
  background:rgba(0,0,0,.7);backdrop-filter:blur(14px);
}
.overlay.show{display:flex}
.ov-sheet{
  background:var(--card);border:1px solid rgba(255,255,255,.12);
  border-radius:20px 20px 14px 14px;padding:28px 24px 24px;
  width:100%;max-width:440px;animation:sheetUp .4s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
@keyframes sheetUp{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
.ov-emoji{font-size:52px;text-align:center;display:block;margin-bottom:12px;animation:bounce .5s cubic-bezier(.34,1.56,.64,1) .1s both}
@keyframes bounce{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:none;opacity:1}}
.ov-title{font-size:28px;font-weight:800;text-align:center;color:var(--gold);margin-bottom:4px}
.ov-sub{font-size:13px;color:var(--t3);text-align:center;margin-bottom:16px}
.ov-stats{background:rgba(255,255,255,.04);border-radius:10px;padding:4px 0;margin-bottom:16px}
.ov-stat{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05)}
.ov-stat:last-child{border:none}
.ov-lbl{font-size:13px;color:var(--t2)}
.ov-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
.ov-btns{display:flex;gap:8px}
.ov-btn{
  flex:1;height:48px;border-radius:999px;border:none;cursor:pointer;
  font-family:var(--font);font-size:15px;font-weight:700;transition:all .15s;
}
.ov-btn.sec{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--t1)}
.ov-btn.pri{background:linear-gradient(135deg,var(--gold),#e8a020);color:#000;box-shadow:0 4px 16px rgba(240,192,64,.3)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--card);border:1px solid var(--border);color:var(--t1);
  padding:9px 18px;border-radius:999px;font-size:12px;font-weight:600;
  z-index:900;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── CONFETTI ── */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:790;display:none}

/* ── MOBILE INPUT ── */
#m-input{position:fixed;opacity:0;width:1px;height:1px;top:50%;left:50%;
  border:none;outline:none;pointer-events:none;z-index:-1;transform:translate(-50%,-50%)}

/* ── ROUND BADGE ── */
.round-badge{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:var(--gold-dim);border:1px solid var(--gold);border-radius:999px;
  padding:3px 12px;font-size:11px;font-weight:700;color:var(--gold);
  letter-spacing:1px;z-index:5;pointer-events:none;
}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="toast" id="toast"></div>
<input id="m-input" type="text" inputmode="text" autocomplete="off"
  autocorrect="off" autocapitalize="characters" spellcheck="false" aria-hidden="true">

<!-- ════════════════════════════════════
     SCREEN 1: SETUP
     ════════════════════════════════════ -->
<div id="screen-setup" class="screen active">
<div class="setup-wrap">

  <div class="logo">
    <div class="logo-grid">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div class="logo-title">TTS <em>Kustom</em></div>
  </div>

  <div class="setup-label">Daftar Soal &amp; Jawaban</div>

  <div class="word-editor">
    <div class="word-editor-toolbar">
      <span class="we-hint">Jawaban: 1 kata, huruf A–Z saja</span>
      <span class="we-count" id="word-count">0 soal</span>
      <button class="toolbar-btn" id="btn-add">＋ Tambah</button>
    </div>
    <div class="word-table" id="word-table"></div>
  </div>

  <button class="start-btn" id="btn-start" disabled>Mulai Bermain →</button>

</div>
</div>

<!-- ════════════════════════════════════
     SCREEN 2: GAME
     ════════════════════════════════════ -->
<div id="screen-game" class="screen">
<div id="app">

  <header class="g-header">
    <button class="g-back" id="btn-back">‹</button>
    <div class="g-title" id="g-title">TTS Kustom</div>
    <div class="g-pills">
      <div class="pill">
        <span class="pill-l">Skor</span>
        <span class="pill-v" id="pv-score">0</span>
      </div>
      <div class="pill">
        <span class="pill-l">Kata</span>
        <span class="pill-v" id="pv-words">0/0</span>
      </div>
    </div>
  </header>

  <div class="g-prog"><div class="g-prog-fill" id="prog-fill"></div></div>

  <div class="g-body">
    <div class="round-badge" id="round-badge">Ronde 1</div>

    <div class="g-grid-area" id="grid-area">
      <div id="grid-container" tabindex="0"></div>
    </div>

    <div class="zoom-wrap">
      <button class="zoom-btn" id="btn-zi">＋</button>
      <button class="zoom-btn" id="btn-zo">－</button>
      <button class="zoom-btn" style="font-size:13px" id="btn-zf">⊡</button>
    </div>

    <aside class="clue-panel">
      <div class="clue-tabs">
        <div class="clue-tab active" data-tab="across">↔ Mendatar</div>
        <div class="clue-tab" data-tab="down">↕ Menurun</div>
      </div>
      <div class="clue-pane active" id="clues-across"></div>
      <div class="clue-pane" id="clues-down"></div>
    </aside>
  </div>

  <footer class="g-footer">
    <button class="ctrl" id="btn-hint">💡 <span class="hint-n" id="hint-n">5</span></button>
    <button class="ctrl" id="btn-reveal">🔓 Buka Kata</button>
    <button class="ctrl p" id="btn-check">✅ Cek</button>
    <button class="ctrl p" id="btn-next-word">⏭ Lanjut</button>
  </footer>

</div>
</div>

<!-- ════════════════════════════════════
     WIN OVERLAY
     ════════════════════════════════════ -->
<div class="overlay" id="win-overlay">
  <div class="ov-sheet">
    <span class="ov-emoji">🎉</span>
    <div class="ov-title">Ronde Selesai!</div>
    <div class="ov-sub" id="win-sub">Luar biasa!</div>
    <div class="ov-stats">
      <div class="ov-stat">
        <span class="ov-lbl">Skor</span>
        <span class="ov-val" id="win-score" style="color:var(--gold)">0</span>
      </div>
      <div class="ov-stat">
        <span class="ov-lbl">Waktu</span>
        <span class="ov-val" id="win-time">0m 0s</span>
      </div>
      <div class="ov-stat">
        <span class="ov-lbl">Kata Benar</span>
        <span class="ov-val" id="win-words" style="color:var(--green)">0</span>
      </div>
      <div class="ov-stat">
        <span class="ov-lbl">Total Ronde</span>
        <span class="ov-val" id="win-round" style="color:var(--purple)">1</span>
      </div>
    </div>
    <div class="ov-btns">
      <button class="ov-btn sec" id="win-back">Kembali</button>
      <button class="ov-btn pri" id="win-next">Ronde Berikut →</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   CROSSWORD GENERATOR (embedded)
   ══════════════════════════════════════════════════════ */
const CrosswordGenerator = (() => {
  const SZ = 20;
  const empty = () => Array.from({length:SZ}, () => Array(SZ).fill(null));

  function canPlace(grid, word, row, col, dir) {
    const len = word.length;
    if (dir === 'across') {
      if (row<0||row>=SZ||col<0||col+len>SZ) return false;
      if (col>0 && grid[row][col-1]) return false;
      if (col+len<SZ && grid[row][col+len]) return false;
      for (let i=0; i<len; i++) {
        const c = grid[row][col+i];
        if (c) { if (c.l!==word[i]||c.v===null) return false; }
        else { if ((row>0&&grid[row-1][col+i])||(row<SZ-1&&grid[row+1][col+i])) return false; }
      }
    } else {
      if (col<0||col>=SZ||row<0||row+len>SZ) return false;
      if (row>0 && grid[row-1][col]) return false;
      if (row+len<SZ && grid[row+len][col]) return false;
      for (let i=0; i<len; i++) {
        const c = grid[row+i][col];
        if (c) { if (c.l!==word[i]||c.a===null) return false; }
        else { if ((col>0&&grid[row+i][col-1])||(col<SZ-1&&grid[row+i][col+1])) return false; }
      }
    }
    return true;
  }

  function place(grid, word, row, col, dir, wi) {
    const len = word.length;
    if (dir === 'across') {
      for (let i=0; i<len; i++) {
        const e = grid[row][col+i];
        if (e) e.a = wi; else grid[row][col+i] = {l:word[i],a:wi,v:null,n:null};
      }
    } else {
      for (let i=0; i<len; i++) {
        const e = grid[row+i][col];
        if (e) e.v = wi; else grid[row+i][col] = {l:word[i],a:null,v:wi,n:null};
      }
    }
  }

  function intersections(grid, word, dir) {
    const res = [];
    for (let r=0; r<SZ; r++) for (let c=0; c<SZ; c++) {
      const cell = grid[r][c]; if (!cell) continue;
      if (dir==='down'   && cell.a===null) continue;
      if (dir==='across' && cell.v===null) continue;
      for (let ci=0; ci<word.length; ci++) {
        if (word[ci]!==cell.l) continue;
        const sr = dir==='down'   ? r-ci : r;
        const sc = dir==='across' ? c-ci : c;
        if (canPlace(grid, word, sr, sc, dir)) res.push({r:sr,c:sc,dir});
      }
    }
    return res;
  }

  function numbers(grid) {
    let n=1;
    for (let r=0; r<grid.length; r++) for (let c=0; c<grid[r].length; c++) {
      const cell = grid[r][c]; if (!cell) continue;
      const isA = (c===0||!grid[r][c-1]) && c+1<grid[r].length && grid[r][c+1];
      const isD = (r===0||!grid[r-1]?.[c]) && r+1<grid.length && grid[r+1]?.[c];
      if (isA||isD) cell.n = n++;
    }
  }

  function crop(grid) {
    let r0=SZ,r1=0,c0=SZ,c1=0,any=false;
    for (let r=0; r<SZ; r++) for (let c=0; c<SZ; c++) if (grid[r][c]) {
      r0=Math.min(r0,r);r1=Math.max(r1,r);c0=Math.min(c0,c);c1=Math.max(c1,c);any=true;
    }
    if (!any) return {g:[[null]],dr:0,dc:0};
    const p=1;
    r0=Math.max(0,r0-p);r1=Math.min(SZ-1,r1+p);c0=Math.max(0,c0-p);c1=Math.min(SZ-1,c1+p);
    return {g:grid.slice(r0,r1+1).map(row=>row.slice(c0,c1+1)),dr:r0,dc:c0};
  }

  function clueMap(grid, placed) {
    const cm = {across:{},down:{}};
    for (const p of placed) {
      const cell = grid[p.r]?.[p.c]; if (!cell?.n) continue;
      const dir = p.dir==='across'?'across':'down';
      cm[dir][cell.n] = {clue:p.w.clue,answer:p.w.answer,r:p.r,c:p.c,len:p.w.answer.length};
    }
    return cm;
  }

  function generate(words, tries=30) {
    if (!words?.length) return null;
    const sorted = [...words].sort((a,b) => b.answer.length-a.answer.length);
    for (let t=0; t<tries; t++) {
      const grid = empty();
      const placed = [];
      const fw = sorted[0].answer;
      const cr = Math.floor(SZ/2), cc = Math.floor((SZ-fw.length)/2);
      place(grid,fw,cr,cc,'across',0);
      placed.push({wi:0,r:cr,c:cc,dir:'across',w:sorted[0]});
      let ok=0;
      for (let i=1; i<sorted.length; i++) {
        const w = sorted[i].answer;
        const dirs = i%2?['down','across']:['across','down'];
        let best=null;
        for (const d of dirs) {
          const cands = intersections(grid,w,d);
          if (!cands.length) continue;
          cands.sort((a,b)=>(Math.abs(a.r-SZ/2)+Math.abs(a.c-SZ/2))-(Math.abs(b.r-SZ/2)+Math.abs(b.c-SZ/2)));
          best=cands[0]; break;
        }
        if (best) { place(grid,w,best.r,best.c,best.dir,i); placed.push({wi:i,r:best.r,c:best.c,dir:best.dir,w:sorted[i]}); ok++; }
      }
      if (ok/(sorted.length-1)>=0.4||t===tries-1) {
        if (placed.length<2) continue;
        const {g,dr,dc} = crop(grid);
        numbers(g);
        const adj = placed.map(p=>({...p,r:p.r-dr,c:p.c-dc}));
        const cm = clueMap(g,adj);
        if (!Object.keys(cm.across).length&&!Object.keys(cm.down).length) continue;
        return {grid:g,clues:cm,width:g[0].length,height:g.length};
      }
    }
    return null;
  }
  return {generate};
})();

let activeScreen = 'screen-setup';

let G = {};
let round = 0;
let totalScore = 0;

function getValidWords() {
  return wordRows.filter(r => r.clue.trim() && r.answer.length >= 3 && r.answer.length <= 15);
}

function pickWords(pool, n=12) {
  // Shuffle and pick n
  const arr = [...pool].sort(() => Math.random()-.5);
  return arr.slice(0, Math.min(n, arr.length));
}

document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('win-next').addEventListener('click', nextRound);
document.getElementById('win-back').addEventListener('click', () => { hideOverlay(); stopTimer(); goTo('screen-setup','back'); });

function startGame() {
  round = 0; totalScore = 0;
  goTo('screen-game','fwd');
  nextRound();
}

function nextRound() {
  hideOverlay();
  round++;
  document.getElementById('round-badge').textContent = `Ronde ${round}`;
  document.getElementById('g-title').textContent = `TTS Kustom — Ronde ${round}`;
  document.getElementById('win-round').textContent = round;

  const pool   = getValidWords();
  const words  = pickWords(pool, 12);
  const result = CrosswordGenerator.generate(words, 40);

  if (!result) {
    showToast('Tidak bisa buat grid, coba lagi…');
    setTimeout(nextRound, 1000);
    return;
  }

  loadGame(result);
}

/* ══════════════════════════════════════════════════════
   GAME ENGINE
   ══════════════════════════════════════════════════════ */
function loadGame(result) {
  G = {
    grid: result.grid,
    clues: result.clues,
    width: result.width,
    height: result.height,
    sel: null, selDir: 'across', selNum: null,
    score: 0, hints: 5,
    wordsOk: new Set(), wordsTotal: 0,
    done: false, startTime: Date.now(),
  };
  G.wordsTotal = Object.keys(G.clues.across).length + Object.keys(G.clues.down).length;

  renderGrid();
  renderClues();
  updateUI();
  startTimer();

  document.getElementById('hint-n').textContent = G.hints;
  document.getElementById('prog-fill').style.width = '0%';

  // Select first clue
  const firstNum = Object.keys(G.clues.across).map(Number).sort((a,b)=>a-b)[0];
  if (firstNum != null) {
    const c = G.clues.across[firstNum];
    selectCell(c.r, c.c, 'across', firstNum);
  }
}

/* ── GRID RENDER ── */
let cellSize = 44;
const SIZES = [24,28,32,36,40,44,48,54,60];

function renderGrid() {
  const cont = document.getElementById('grid-container');
  cont.innerHTML = '';
  const sz = cellSize;
  const tbl = document.createElement('div');
  tbl.className = 'cw-grid';
  tbl.style.gridTemplateColumns = `repeat(${G.width},${sz}px)`;
  tbl.style.gridTemplateRows    = `repeat(${G.height},${sz}px)`;
  tbl.style.gap = '3px';

  for (let r=0; r<G.height; r++) for (let c=0; c<G.width; c++) {
    const cell = G.grid[r][c];
    const div = document.createElement('div');
    div.id = `c-${r}-${c}`;
    div.style.width = div.style.height = sz+'px';
    if (!cell) {
      div.className = 'cw-cell blocked';
    } else {
      div.className = 'cw-cell active';
      div.dataset.r = r; div.dataset.c = c;
      if (cell.n) {
        const n = document.createElement('span');
        n.className = 'cell-n'; n.textContent = cell.n;
        n.style.fontSize = Math.max(6,Math.floor(sz*.2))+'px';
        div.appendChild(n);
      }
      const l = document.createElement('span');
      l.className = 'cell-l';
      l.style.fontSize = Math.max(12,Math.floor(sz*.45))+'px';
      div.appendChild(l);
      div.addEventListener('click', () => { handleClick(r,c); focusInput(); });
      div.addEventListener('touchstart', e => { e.preventDefault(); handleClick(r,c); focusInput(); },{passive:false});
    }
    tbl.appendChild(div);
  }
  cont.appendChild(tbl);
  requestAnimationFrame(zoomFit);
  initMobileInput();
}

function setCellSize(sz) {
  cellSize = sz;
  const tbl = document.querySelector('.cw-grid');
  if (!tbl) return;
  tbl.style.gridTemplateColumns = `repeat(${G.width},${sz}px)`;
  tbl.style.gridTemplateRows    = `repeat(${G.height},${sz}px)`;
  document.querySelectorAll('.cw-cell').forEach(c => { c.style.width = c.style.height = sz+'px'; });
  const ns = Math.max(6,Math.floor(sz*.2))+'px';
  const ls = Math.max(12,Math.floor(sz*.45))+'px';
  document.querySelectorAll('.cell-n').forEach(n => n.style.fontSize = ns);
  document.querySelectorAll('.cell-l').forEach(l => l.style.fontSize = ls);
  const area = document.getElementById('grid-area');
  if (area) {
    const gw = G.width*sz+(G.width-1)*3, gh = G.height*sz+(G.height-1)*3;
    area.classList.toggle('centered', gw<=area.clientWidth-32 && gh<=area.clientHeight-32);
  }
}

function zoomFit() {
  const area = document.getElementById('grid-area');
  if (!area||!G.width||!G.height) return;
  const r = area.getBoundingClientRect();
  const raw = Math.min((r.width-32)/G.width, (r.height-32)/G.height);
  const best = SIZES.reduce((p,s) => Math.abs(s-raw)<Math.abs(p-raw)?s:p);
  setCellSize(best);
}

document.getElementById('btn-zi').addEventListener('click', () => { const i=SIZES.indexOf(cellSize); if(i<SIZES.length-1) setCellSize(SIZES[i+1]); });
document.getElementById('btn-zo').addEventListener('click', () => { const i=SIZES.indexOf(cellSize); if(i>0) setCellSize(SIZES[i-1]); });
document.getElementById('btn-zf').addEventListener('click', zoomFit);

/* ── CLUES ── */
function renderClues() {
  ['across','down'].forEach(dir => {
    const el = document.getElementById('clues-'+dir);
    el.innerHTML = '';
    Object.keys(G.clues[dir]).map(Number).sort((a,b)=>a-b).forEach(num => {
      const li = document.createElement('div');
      li.className = 'clue-item'; li.id = `clue-${dir}-${num}`;
      li.innerHTML = `<span class="clue-num">${num}</span><span class="clue-text">${G.clues[dir][num].clue}</span>`;
      li.addEventListener('click', () => { const c=G.clues[dir][num]; selectCell(c.r,c.c,dir,num); });
      el.appendChild(li);
    });
  });
  document.querySelectorAll('.clue-tab').forEach(tab => {
    tab.onclick = () => {
      const t = tab.dataset.tab;
      document.querySelectorAll('.clue-tab').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.clue-pane').forEach(x=>x.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('clues-'+t).classList.add('active');
    };
  });
}

/* ── SELECTION ── */
function cellEl(r,c) { return document.getElementById(`c-${r}-${c}`); }

function clearHighlights() {
  document.querySelectorAll('.cw-cell.hi,.cw-cell.sel').forEach(e => e.classList.remove('hi','sel'));
  document.querySelectorAll('.clue-item.active').forEach(e => e.classList.remove('active'));
}

function selectCell(r, c, dir, num) {
  G.sel={r,c}; G.selDir=dir; G.selNum=num;
  clearHighlights();
  const clue = G.clues[dir][num];
  if (clue) {
    for (let i=0; i<clue.len; i++) {
      const er = dir==='across'?r:r+i, ec = dir==='across'?c+i:c;
      cellEl(er,ec)?.classList.add('hi');
    }
  }
  cellEl(r,c)?.classList.add('sel');
  const ce = document.getElementById(`clue-${dir}-${num}`);
  if (ce) { ce.classList.add('active'); ce.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  // switch tab if needed
  const tab = document.querySelector(`.clue-tab[data-tab="${dir}"]`);
  if (tab&&!tab.classList.contains('active')) tab.click();
}

function handleClick(r, c) {
  if (!G.grid[r]?.[c]) return;
  if (G.sel?.r===r && G.sel?.c===c) {
    const alt = G.selDir==='across'?'down':'across';
    const cl = clueForCell(r,c,alt);
    if (cl) { selectCell(r,c,alt,cl.num); return; }
  }
  let cl = clueForCell(r,c,G.selDir);
  if (!cl) { const alt=G.selDir==='across'?'down':'across'; cl=clueForCell(r,c,alt); if(cl) G.selDir=alt; }
  if (cl) selectCell(r,c,G.selDir,cl.num);
}

function clueForCell(r,c,dir) {
  const map = G.clues[dir];
  for (const [num,clue] of Object.entries(map)) {
    if (dir==='across' ? (clue.r===r && c>=clue.c && c<clue.c+clue.len)
                       : (clue.c===c && r>=clue.r && r<clue.r+clue.len))
      return {...clue, num:+num};
  }
  return null;
}

/* ── INPUT ── */
function focusInput() {
  const inp = document.getElementById('m-input');
  if (inp) { inp.value=''; inp.focus({preventScroll:true}); }
}

function initMobileInput() {
  const inp = document.getElementById('m-input');
  if (!inp) return;
  inp.oninput = e => {
    const val = inp.value.replace(/[^a-zA-Z]/g,'');
    if (val && G.sel && !G.done) { inputLetter(G.sel.r, G.sel.c, val.slice(-1).toUpperCase()); }
    inp.value = '';
  };
  inp.onkeydown = e => {
    if (G.done) return;
    if (e.key==='Backspace') { e.preventDefault(); if(G.sel) { clearCell(G.sel.r,G.sel.c); movePrev(); } }
    if (e.key==='Tab') { e.preventDefault(); nextWord(e.shiftKey); }
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) { e.preventDefault(); arrowMove(e.key); }
  };
}

document.addEventListener('keydown', e => {
  if (!G.sel||G.done||activeScreen!=='screen-game') return;
  const {r,c} = G.sel;
  if (e.key==='Backspace') { e.preventDefault(); clearCell(r,c); movePrev(); return; }
  if (e.key==='Tab') { e.preventDefault(); nextWord(e.shiftKey); return; }
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) { e.preventDefault(); arrowMove(e.key); return; }
  if (e.key.length===1 && /[a-zA-Z]/.test(e.key)) { e.preventDefault(); inputLetter(r,c,e.key.toUpperCase()); }
});

function arrowMove(key) {
  if (!G.sel) return;
  const {r,c} = G.sel;
  const d = {ArrowLeft:[0,-1],ArrowRight:[0,1],ArrowUp:[-1,0],ArrowDown:[1,0]}[key];
  tryMove(r+d[0], c+d[1]);
}

function tryMove(r,c) {
  if (r<0||c<0||r>=G.height||c>=G.width||!G.grid[r]?.[c]) return;
  const cl = clueForCell(r,c,G.selDir) || clueForCell(r,c,G.selDir==='across'?'down':'across');
  if (cl) selectCell(r,c,cl.r===r?'across':'down',cl.num);
}

function moveNext() {
  if (!G.sel) return;
  const {r,c} = G.sel;
  const nr = G.selDir==='down'?r+1:r, nc = G.selDir==='across'?c+1:c;
  if (nr<G.height&&nc<G.width&&G.grid[nr]?.[nc]) tryMove(nr,nc);
}
function movePrev() {
  if (!G.sel) return;
  const {r,c} = G.sel;
  const nr = G.selDir==='down'?r-1:r, nc = G.selDir==='across'?c-1:c;
  if (nr>=0&&nc>=0&&G.grid[nr]?.[nc]) tryMove(nr,nc);
}
function nextWord(rev=false) {
  const all = [
    ...Object.entries(G.clues.across).map(([n,c])=>({num:+n,dir:'across',clue:c})),
    ...Object.entries(G.clues.down  ).map(([n,c])=>({num:+n,dir:'down',  clue:c})),
  ].sort((a,b)=>a.num-b.num||(a.dir==='across'?-1:1));
  const idx = all.findIndex(x=>x.num===G.selNum&&x.dir===G.selDir);
  let ni = rev ? idx-1 : idx+1;
  if (ni<0) ni=all.length-1; if (ni>=all.length) ni=0;
  const w=all[ni]; if(w) selectCell(w.clue.r,w.clue.c,w.dir,w.num);
}

/* ── LETTER ── */
function inputLetter(r,c,letter) {
  if (!G.grid[r]?.[c]) return;
  G.grid[r][c].user = letter;
  const l = cellEl(r,c)?.querySelector('.cell-l');
  if (l) l.textContent = letter;
  const el = cellEl(r,c);
  if (el) { el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
  checkWord();
  moveNext();
}
function clearCell(r,c) {
  if (!G.grid[r]?.[c]) return;
  G.grid[r][c].user = '';
  const l = cellEl(r,c)?.querySelector('.cell-l');
  if (l) l.textContent = '';
}

/* ── CHECK ── */
function checkWord() {
  if (G.selNum==null) return;
  const dir=G.selDir, clue=G.clues[dir][G.selNum]; if(!clue) return;
  const key=`${dir}-${G.selNum}`; if(G.wordsOk.has(key)) return;
  let filled=true, correct=true;
  for (let i=0; i<clue.len; i++) {
    const gr=dir==='across'?clue.r:clue.r+i, gc=dir==='across'?clue.c+i:clue.c;
    const cell=G.grid[gr]?.[gc];
    if (!cell||!cell.user) { filled=false; break; }
    if (cell.user!==clue.answer[i]) correct=false;
  }
  if (filled && correct) onWordOk(dir,G.selNum,clue);
  else if (filled && !correct) flashWord(clue,dir,'err');
}

function onWordOk(dir,num,clue) {
  const key=`${dir}-${num}`; G.wordsOk.add(key); 
  const pts = clue.len*10;
  G.score += pts; totalScore += pts;
  updateUI();
  flashWord(clue,dir,'ok');
  document.getElementById(`clue-${dir}-${num}`)?.classList.add('done');
  floatScore(pts);
  if (G.wordsOk.size>=G.wordsTotal) setTimeout(onComplete,400);
}

function flashWord(clue,dir,cls) {
  for (let i=0; i<clue.len; i++) {
    const r=dir==='across'?clue.r:clue.r+i, c=dir==='across'?clue.c+i:clue.c;
    const el=cellEl(r,c); if(!el) continue;
    el.classList.add(cls);
    if (cls!=='ok') setTimeout(()=>el.classList.remove(cls),600);
  }
}

function updateUI() {
  document.getElementById('pv-score').textContent = G.score;
  document.getElementById('pv-words').textContent = `${G.wordsOk.size}/${G.wordsTotal}`;
  document.getElementById('prog-fill').style.width = `${G.wordsTotal?G.wordsOk.size/G.wordsTotal*100:0}%`;
}

/* ── CONTROLS ── */
document.getElementById('btn-hint').addEventListener('click', () => {
  if (G.hints<=0||!G.sel) return;
  const {r,c}=G.sel, cell=G.grid[r]?.[c];
  if (!cell||cell.user===cell.l) return;
  cell.user=cell.l;
  const l=cellEl(r,c)?.querySelector('.cell-l'); if(l) l.textContent=cell.l;
  cellEl(r,c)?.classList.add('hint');
  G.hints--; document.getElementById('hint-n').textContent=G.hints;
  checkWord();
});

document.getElementById('btn-reveal').addEventListener('click', () => {
  if (!G.selNum) return;
  const dir=G.selDir, clue=G.clues[dir][G.selNum]; if(!clue) return;
  for (let i=0; i<clue.len; i++) {
    const gr=dir==='across'?clue.r:clue.r+i, gc=dir==='across'?clue.c+i:clue.c;
    const cell=G.grid[gr]?.[gc]; if(!cell) continue;
    cell.user=cell.l;
    const l=cellEl(gr,gc)?.querySelector('.cell-l'); if(l) l.textContent=cell.l;
    cellEl(gr,gc)?.classList.add('hint');
  }
  G.hints=Math.max(0,G.hints-2); document.getElementById('hint-n').textContent=G.hints;
  setTimeout(checkWord,50);
});

document.getElementById('btn-check').addEventListener('click', () => {
  let err=0;
  for (let r=0; r<G.height; r++) for (let c=0; c<G.width; c++) {
    const cell=G.grid[r]?.[c];
    if (cell&&cell.user&&cell.user!==cell.l) {
      const el=cellEl(r,c); if(el){el.classList.add('err');setTimeout(()=>el.classList.remove('err'),2000);} err++;
    }
  }
  showToast(err===0?'Semua jawaban benar! 🎉':`${err} sel salah`);
});

document.getElementById('btn-next-word').addEventListener('click', () => nextWord());

/* ── TIMER ── */
let timerInterval = null;
function startTimer() {
  G.startTime = Date.now();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    // timer jalan tapi tidak ditampilkan di sini (disimpan di G.startTime)
  }, 1000);
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval=null; } }

/* ── COMPLETE ── */
function onComplete() {
  if (G.done) return; G.done=true; stopTimer();
  const elapsed = Math.floor((Date.now()-G.startTime)/1000);
  const m=Math.floor(elapsed/60), s=elapsed%60;
  document.getElementById('win-score').textContent = G.score;
  document.getElementById('win-time').textContent  = `${m}m ${s}s`;
  document.getElementById('win-words').textContent  = G.wordsOk.size;
  document.getElementById('win-round').textContent  = round;
  document.getElementById('win-sub').textContent    = G.wordsOk.size>=G.wordsTotal?'Sempurna! Semua kata benar!':'Ronde selesai!';
  document.getElementById('win-overlay').classList.add('show');
  confetti();
}

/* ── FLOAT SCORE ── */
function floatScore(pts) {
  const el=document.getElementById('pv-score');
  const f=document.createElement('div');
  f.textContent=`+${pts}`;
  const r=el.getBoundingClientRect();
  f.style.cssText=`position:fixed;left:${r.left}px;top:${r.top-8}px;font-size:18px;font-weight:800;color:var(--green);pointer-events:none;z-index:500;animation:score-rise .9s forwards`;
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),950);
}
const ss=document.createElement('style');
ss.textContent='@keyframes score-rise{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-44px)}}';
document.head.appendChild(ss);

/* ── TOAST ── */
let toastTimer;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

/* ── OVERLAY ── */
function hideOverlay() { document.getElementById('win-overlay').classList.remove('show'); }

/* ── CONFETTI ── */
function confetti() {
  const c=document.getElementById('confetti-canvas');
  c.style.display='block'; c.width=innerWidth; c.height=innerHeight;
  const ctx=c.getContext('2d');
  const pts=Array.from({length:90},()=>({
    x:Math.random()*innerWidth,y:-20,vx:(Math.random()-.5)*5,vy:Math.random()*4+2,
    s:Math.random()*9+4,color:`hsl(${Math.random()*360},85%,60%)`,rot:Math.random()*360,rv:(Math.random()-.5)*12
  }));
  let f=0;
  (function tick(){
    ctx.clearRect(0,0,c.width,c.height);
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.rot+=p.rv;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s);ctx.restore();
    });
    if(++f<150) requestAnimationFrame(tick);
    else{ctx.clearRect(0,0,c.width,c.height);c.style.display='none';}
  })();
}
</script>
